name: claude-news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "테스트 메시지 전송"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: claude-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 수집·게시
        env:
          # webhook은 생성 시 지정한 채널(테스트: C0AB32ZMK0C)에만 게시 가능
          SLACK_WEBHOOK_URLS: ${{ secrets.SLACK_WEBHOOK_URLS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNELS: "C0AB32ZMK0C"  # 토큰 모드일 때의 게시 대상
        run: |
          if [ "${{ inputs.test }}" = "true" ]; then
            python3 collect.py --test
          else
            python3 collect.py
          fi

      - name: 상태 커밋
        run: |
          [ -f state/published.json ] || exit 0  # 테스트 모드는 state를 만들지 않는다
          git config user.name "claude-news-bot"
          git config user.email "actions@github.com"
          git add state/published.json
          git diff --cached --quiet || { git commit -m "state: $(date -u +%Y-%m-%dT%H:%M)" && git push; }
